services:
  db:
    image: postgres:15
    container_name: meal_planner_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: meal_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meal_planner_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@db:5432/meal_planner
      SECRET_KEY_JWT: dkFO6nuiNcOZCOG5CSV1My_Rj-n9uI4JIcktbRtckAA
    restart: always

  nginx:
    image: nginx:alpine
    container_name: meal_planner_nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data: