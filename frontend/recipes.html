<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рецепты — Meal Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/recipes.js" defer></script>
    <script src="js/pages/recipes.js" defer></script>
    <script src="js/navbar.js" defer></script>
</head>
<body class="bg-gradient-custom">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-nav-custom">
            <div class="container">
                <a class="navbar-brand" href="index.html">🍽️ Meal Planner</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="recipes.html">Рецепты</a></li>
                        <li class="nav-item"><a class="nav-link" href="plans.html">Планы</a></li>
                        <li class="nav-item"><a class="nav-link" href="shopping.html">Список покупок</a></li>
                        <li class="nav-item" id="admin-link"><a class="nav-link" href="admin.html">Админ</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="text-white text-shadow">📖 Мои рецепты</h1>
                <a href="create-recipe.html" class="btn btn-accent">+ Создать рецепт</a>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Поиск по названию...">
                </div>
                <div class="col-md-4">
                    <select id="categoryFilter" class="form-select">
                        <option value="">Все категории</option>
                        <option value="breakfast">Завтрак</option>
                        <option value="lunch">Обед</option>
                        <option value="dinner">Ужин</option>
                        <option value="dessert">Десерт</option>
                        <option value="snack">Перекус</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-accent w-100" id="searchBtn">Поиск</button>
                </div>
            </div>

            <div id="recipes-container" class="row"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
