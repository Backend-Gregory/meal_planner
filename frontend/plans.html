<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы — Meal Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/plans.js" defer></script>
    <script src="js/pages/plans.js" defer></script>
    <script src="js/navbar.js" defer></script>
</head>
<body class="bg-gradient-custom">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-nav-custom">
            <div class="container">
                <a class="navbar-brand" href="index.html">🍽️ Meal Planner</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="recipes.html">Рецепты</a></li>
                        <li class="nav-item"><a class="nav-link active" href="plans.html">Планы</a></li>
                        <li class="nav-item"><a class="nav-link" href="shopping.html">Список покупок</a></li>
                        <li class="nav-item" id="admin-link"><a class="nav-link" href="admin.html">Админ</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h1 class="text-white text-shadow">📅 План на неделю</h1>
                <div class="d-flex gap-2 flex-wrap align-items-center">
                    <button id="prevWeekBtn" class="btn btn-outline-light">⬅️</button>
                    <input type="date" id="weekPicker" class="form-control" style="width: auto;">
                    <button id="currentWeekBtn" class="btn btn-accent">📆 Текущая</button>
                    <button id="nextWeekBtn" class="btn btn-outline-light">➡️</button>
                    <button id="copyPlanBtn" class="btn btn-outline-light">📋 Скопировать</button>
                    <button id="createPlanBtn" class="btn btn-success">➕ Создать</button>
                </div>
            </div>

            <div id="plans-container" class="row">
            </div>
        </div>
    </main>
    <div class="modal fade" id="editPlanModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header">
                    <h5 class="modal-title">✏️ Редактировать день</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="editPlanBody">
                    <p class="text-center text-muted">Загрузка...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
