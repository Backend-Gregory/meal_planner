<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Meal Planner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
    <body class="bg-gradient-custom">

        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-nav-custom fixed-top animate__animated animate__fadeInDown">
                <div class="container">
                    <a class="navbar-brand fw-bold" href="index.html">🍽️ Meal Planner</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item"><a class="nav-link" href="login.html">Войти</a></li>
                            <li class="nav-item"><a class="nav-link" href="register.html">Регистрация</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <div class="d-flex align-items-center justify-content-center vh-100">
                <div class="glass-card text-white text-shadow animate__animated animate__zoomIn">
                    <h2 class="text-center mb-4 fw-bold">📝 Регистрация</h2>
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя</label>
                            <input type="text" class="form-control" id="name" placeholder="Иван Иванов" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="example@mail.ru" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="button" class="btn btn-accent w-100" onclick="register()">Зарегистрироваться</button>
                    </form>
                    <p class="text-center mt-3 text-light opacity-75">
                        Уже есть аккаунт? <a href="login.html">Войти</a>
                    </p>
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
