<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать план — Meal Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/recipes.js" defer></script>
    <script src="js/plans.js" defer></script>
    <script src="js/pages/create-plan.js" defer></script>
    <script src="js/navbar.js" defer></script>
</head>
<body class="bg-gradient-custom">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-nav-custom">
            <div class="container">
                <a class="navbar-brand" href="index.html">🍽️ Meal Planner</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="recipes.html">Рецепты</a></li>
                        <li class="nav-item"><a class="nav-link" href="plans.html">Планы</a></li>
                        <li class="nav-item"><a class="nav-link" href="shopping.html">Список покупок</a></li>
                        <li class="nav-item" id="admin-link"><a class="nav-link" href="admin.html">Админ</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <div class="glass-card text-white mx-auto" style="max-width: 800px;">
                <h2 class="text-center mb-4 fw-bold">📅 Создать план на неделю</h2>

                <form id="createPlanForm">
                    <!-- Дата начала недели -->
                    <div class="mb-4">
                        <label for="weekStart" class="form-label">Дата начала недели (понедельник)</label>
                        <input type="date" class="form-control" id="weekStart" required>
                    </div>

                    <!-- Дни недели -->
                    <div id="daysContainer">
                        <!-- JS заполнит -->
                    </div>

                    <button type="submit" class="btn btn-accent w-100 mt-3">💾 Сохранить план</button>
                    <a href="plans.html" class="btn btn-outline-light w-100 mt-2">Отмена</a>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
