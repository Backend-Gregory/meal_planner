<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать рецепт — Meal Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/recipes.js" defer></script>
    <script src="js/navbar.js" defer></script>
</head>
<body class="bg-gradient-custom">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-nav-custom">
            <div class="container">
                <a class="navbar-brand" href="index.html">🍽️ Meal Planner</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="recipes.html">Рецепты</a></li>
                        <li class="nav-item"><a class="nav-link" href="plans.html">Планы</a></li>
                        <li class="nav-item"><a class="nav-link" href="shopping.html">Список покупок</a></li>
                        <li class="nav-item" id="admin-link"><a class="nav-link" href="admin.html">Админ</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <div class="glass-card text-white mx-auto" style="max-width: 700px;">
                <h2 class="text-center mb-4 fw-bold">✏️ Редактировать рецепт</h2>
                <form id="editRecipeForm">
                    <div class="mb-3">
                        <label for="recipe_title" class="form-label">Название</label>
                        <input type="text" class="form-control" id="recipe_title" required>
                    </div>
                    <div class="mb-3">
                        <label for="recipe_description" class="form-label">Описание</label>
                        <textarea class="form-control" id="recipe_description" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="recipe_ingredients" class="form-label">Ингредиенты (каждый с новой строки)</label>
                        <textarea class="form-control" id="recipe_ingredients" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="recipe_instructions" class="form-label">Инструкция</label>
                        <textarea class="form-control" id="recipe_instructions" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="recipe_category" class="form-label">Категория</label>
                        <select class="form-select" id="recipe_category">
                            <option value="breakfast">Завтрак</option>
                            <option value="lunch">Обед</option>
                            <option value="dinner">Ужин</option>
                            <option value="dessert">Десерт</option>
                            <option value="snack">Перекус</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="recipe_cooking_time" class="form-label">Время (мин)</label>
                        <input type="number" class="form-control" id="recipe_cooking_time" required>
                    </div>
                    <button type="button" class="btn btn-accent w-100" onclick="updateRecipeFromForm()">💾 Сохранить</button>
                    <a href="recipes.html" class="btn btn-outline-light w-100 mt-2">Отмена</a>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            initEditRecipePage();
        });
    </script>
</body>
</html>
