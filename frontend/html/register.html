<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Регистрация">
        <meta name="keywords" content="Planner food, Meal_Planner, Регистрация">
        <title>Регистрация — Meal Planner</title>
    </head>
    <body>
        <header>
            <button onclick="history.back()">← Назад</button>
            <a href="index.html">Meal Planner</a>
        </header>
        <main>
            <section>
                <h1>Регистрация</h1>
                <p>Создайте аккаунт для использования сервиса</p>
                <form>
                    <div>
                        <label for="user_name">Имя</label>
                        <input id="user_name" type="text" name="user_name" placeholder="Введите имя пользователя">
                    </div>
                    <div>
                        <label for="user_email">Email</label>
                        <input id="user_email" type="email" name="user_email" placeholder="Введите Email">
                    </div>
                    <div>
                        <label for="user_password">Пароль</label>
                        <input id="user_password" type="password" name="user_password" placeholder="Введите пароль">
                    </div>
                    <button type="submit">Зарегистрироваться</button>
                    <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                </form>
            </section>
        </main>
    </body>
</html>
