<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Вход в систему">
        <meta name="keywords" content="Planner food, Meal_Planner, вход, авторизация">
        <title>Вход — Meal Planner</title>
    </head>
    <body>
        <header>
            <button onclick="history.back()">← Назад</button>
            <a href="index.html">Meal Planner</a>
        </header>
        <main>
            <section>
                <h1>Вход в систему</h1>
                <p>Введите свои данные для входа</p>
                <form>
                    <div>
                        <label for="user_email">Email</label>
                        <input id="user_email" type="email" name="user_email" placeholder="Введите email">
                    </div>
                    <div>
                        <label for="user_password">Пароль</label>
                        <input id="user_password" type="password" name="user_password" placeholder="Введите пароль">
                    </div>
                    <button type="submit">Войти</button>
                    <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                </form>
            </section>
        </main>
    </body>
</html>
