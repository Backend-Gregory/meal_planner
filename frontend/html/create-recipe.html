<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Создание рецепта">
        <meta name="keywords" content="Planner food, Meal_Planner, создать рецепт">
        <title>Создать рецепт — Meal Planner</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/api.js" defer></script>
        <script src="../js/auth.js" defer></script>
        <script src="../js/recipes.js" defer></script>
        <script>
            checkAuth()
        </script>
        <script>
            initEditRecipePage()
        </script>
    </head>
    <body>
        <header>
            <div>
                <a href="index.html">Meal Planner</a>
                <div>
                    <a href="recipes.html">Рецепты</a>
                    <a href="plans.html">Планы</a>
                    <a href="shopping.html">Список покупок</a>
                    <button onclick="logout()">Выйти</button>
                </div>
            </div>
        </header>
        <main>
            <section>
                <h1>Создать рецепт</h1>
                <form>
                    <div>
                        <label for="recipe_title">Название</label>
                        <input id="recipe_title" type="text" name="recipe-title" placeholder="Введите название">
                    </div>
                    <div>
                        <label for="recipe_description">Описание (необязательно)</label>
                        <textarea id="recipe_description" name="recipe_description" placeholder="Введите описание"></textarea>
                    </div>
                    <div>
                        <label for="recipe_ingredients">Ингредиенты (каждый с новой строки)</label>
                        <textarea name="recipe_ingredients" id="recipe_ingredients" placeholder="Введите ингредиенты"></textarea>
                    </div>
                    <div>
                        <label for="recipe_instructions">Инструкция по приготовлению</label>
                        <textarea name="recipe_instructions" id="recipe_instructions" placeholder="Введите инструкцию"></textarea>
                    </div>
                    <div>
                        <label for="recipe_category">Категория</label>
                        <select name="recipe_category" id="recipe_category">
                            <option value="breakfast">Завтрак</option>
                            <option value="lunch">Обед</option>
                            <option value="dinner">Ужин</option>
                        </select>
                    </div>
                    <div>
                        <label for="recipe_cooking_time">Время приготовления (мин)</label>
                        <input id="recipe_cooking_time" type="number" name="recipe_cooking_time" placeholder="Введите время приготовления">
                    </div>
                    <div>
                        <button type="submit">Сохранить</button>
                        <a href="recipes.html">Отмена</a>
                        <button type="reset">Очистить</button>
                    </div>
                </form>
            </section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
